---
version: 0.1
runson: win

autosplit: true
concurrency: 2

runtime:
  language: java
  version: 11

cacheKey: '{{ checksum "pom.xml" }}'
cacheDirectories:
  - .m2

pre:
  - mvn dependency:resolve

testDiscovery:
  type: raw
  mode: static
  command: grep 'test name' xml/testng_win.xml | awk '{print$2}' | sed 's/name=//g' | sed 's/\x3e//g'

testRunnerCommand: mvn test `-Dplatname=win dependency:resolve `-DselectedTests=$test

retryOnFailure: true
maxRetries: 1

jobLabel: [selenium-testng, win, v1, autosplit]

project:
  id: qwerty
